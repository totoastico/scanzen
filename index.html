<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />

  <!-- Mobile-first : on adapte la largeur à l'écran du téléphone.
       viewport-fit=cover : on occupe tout l'écran, encoches comprises. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- Couleur de la barre du navigateur sur mobile -->
  <meta name="theme-color" content="#ffffff" />

  <!-- PWA : installation (icône + plein écran) -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Scanzen" />
  <meta name="mobile-web-app-capable" content="yes" />

  <title>Scanzen — Scanner de documents</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- =========================================================
       ÉCRAN D'ACCUEIL
       Un seul écran est visible à la fois (classe "screen--active").
       ========================================================= -->
  <section class="screen screen--active" id="screen-home">
    <div class="home">
      <!-- LE bouton central : l'élément dominant de l'interface -->
      <button class="scan-button" id="btn-scan" type="button">
        Scanzenons
      </button>

      <!-- Option discrète : importer une image existante -->
      <label class="upload-link">
        <span class="upload-link__icon">⤓</span> Téléverser
        <input type="file" id="file-input" accept="image/*" hidden />
      </label>

      <span class="brand">scanzen</span>
    </div>
  </section>

  <!-- =========================================================
       ÉCRAN CAMÉRA
       La vidéo remplit l'écran ; par-dessus : un bouton "fermer"
       en haut et le gros bouton de capture en bas.
       ========================================================= -->
  <section class="screen screen--camera" id="screen-camera">
    <!-- Le flux vidéo de la caméra (rempli au démarrage par camera.js) -->
    <video class="camera__video" id="camera-video" autoplay playsinline muted></video>

    <!-- Barre du haut : fermer -->
    <div class="camera__top">
      <button class="icon-button" id="btn-close-camera" type="button" aria-label="Fermer">✕</button>
    </div>

    <!-- Barre du bas : bouton de capture (dominant) -->
    <div class="camera__bottom">
      <button class="shutter" id="btn-capture" type="button" aria-label="Capturer la photo"></button>
    </div>

    <!-- Message d'erreur (caché par défaut) si la caméra est refusée/absente -->
    <div class="camera__error" id="camera-error" hidden>
      <p id="camera-error-text">Impossible d'accéder à la caméra.</p>
      <button class="btn-secondary btn-secondary--light" id="btn-camera-back" type="button">Retour</button>
    </div>
  </section>

  <!-- =========================================================
       ÉCRAN APERÇU
       Montre la photo capturée. "Reprendre" relance la caméra,
       "Continuer" mènera au recadrage (étape 3).
       ========================================================= -->
  <section class="screen screen--preview" id="screen-preview">
    <div class="preview">
      <img class="preview__image" id="preview-image" alt="Photo capturée" />
    </div>
    <div class="preview__actions">
      <button class="btn-secondary btn-secondary--light" id="btn-retake" type="button">Reprendre</button>
      <button class="btn-primary" id="btn-use" type="button">Continuer</button>
    </div>
  </section>

  <!-- =========================================================
       ÉCRAN RECADRAGE
       La photo capturée + un quadrilatère à 4 coins glissables.
       L'overlay SVG est rempli par scanner.js.
       ========================================================= -->
  <section class="screen screen--crop" id="screen-crop">
    <div class="crop__stage">
      <div class="crop__frame" id="crop-frame">
        <img class="crop__image" id="crop-image" alt="Document à recadrer" />
        <svg class="crop__overlay" id="crop-overlay"></svg>
      </div>
    </div>

    <div class="crop__actions">
      <button class="btn-secondary btn-secondary--light" id="btn-crop-back" type="button">Reprendre</button>
      <button class="btn-primary" id="btn-crop-confirm" type="button">Valider</button>
    </div>

    <!-- Voile affiché le temps qu'OpenCV se charge (1re fois seulement) -->
    <div class="crop__loading" id="crop-loading" hidden>
      <span>Chargement du moteur de détection…</span>
    </div>
  </section>

  <!-- =========================================================
       ÉCRAN RÉSULTAT (provisoire)
       Montre la page redressée. Les filtres (étape 4) et l'ajout
       à la liste (étape 5) viendront se greffer ici.
       ========================================================= -->
  <section class="screen screen--result" id="screen-result">
    <div class="preview">
      <img class="preview__image" id="result-image" alt="Document scanné" />
      <!-- Flèches de rotation posées sur les bords gauche/droite de l'image -->
      <button class="edge-btn edge-btn--left" id="btn-rotate-left" type="button" aria-label="Pivoter à gauche">↺</button>
      <button class="edge-btn edge-btn--right" id="btn-rotate-right" type="button" aria-label="Pivoter à droite">↻</button>
    </div>

    <!-- Choix du rendu "scan" appliqué à la page redressée -->
    <div class="filters" id="filters">
      <button class="filter-btn" type="button" data-filter="original">Original</button>
      <button class="filter-btn" type="button" data-filter="auto">Auto</button>
      <button class="filter-btn" type="button" data-filter="bw">Noir &amp; blanc</button>
    </div>

    <div class="preview__actions">
      <button class="btn-secondary btn-secondary--light" id="btn-result-retake" type="button">Reprendre</button>
      <button class="btn-primary" id="btn-add-to-list" type="button">Ajouter</button>
    </div>
  </section>

  <!-- =========================================================
       ÉCRAN LISTE DES PAGES
       Les vignettes (avec monter / descendre / supprimer) sont
       générées par pages.js.
       ========================================================= -->
  <section class="screen screen--pages" id="screen-pages">
    <header class="pages__top">
      <span class="wordmark">Scanzen</span>
      <span class="pages__count" id="pages-count">0 page</span>
    </header>

    <div class="pages__list" id="pages-list"></div>

    <div class="pages__cachet">
      <button class="btn-secondary" id="btn-cachet" type="button">🎙️ Fiche cachet (contrat)</button>
    </div>

    <label class="ocr-toggle">
      <input type="checkbox" id="ocr-toggle" checked />
      <span>Texte sélectionnable (OCR, français — plus lent)</span>
    </label>

    <div class="pages__actions">
      <button class="btn-secondary" id="btn-add-page" type="button">+ Ajouter une page</button>
      <button class="btn-primary" id="btn-export" type="button">Exporter en PDF</button>
    </div>
  </section>

  <!-- =========================================================
       ÉCRAN FICHE CACHET (contrat voix off)
       9 champs à vérifier/compléter + nom de fichier généré.
       ========================================================= -->
  <section class="screen screen--contract" id="screen-contract">
    <header class="pages__top">
      <span class="wordmark">Fiche cachet</span>
    </header>

    <div class="form">
      <button class="btn-secondary" id="btn-prefill" type="button">✨ Pré-remplir depuis le scan (OCR)</button>

      <label class="field">Projet / Œuvre
        <input id="f-projet" type="text" />
      </label>
      <label class="field">Studio d'enregistrement
        <input id="f-studio" type="text" />
      </label>
      <label class="field">Employé (si différent du studio)
        <input id="f-employe" type="text" />
      </label>
      <label class="field">Directeur artistique
        <input id="f-da" type="text" />
      </label>
      <label class="field">Date de réalisation
        <input id="f-date" type="date" />
      </label>
      <label class="field">Nombre de lignes
        <input id="f-lignes" type="number" inputmode="numeric" />
      </label>
      <label class="field">Montant brut (€)
        <input id="f-brut" type="number" inputmode="decimal" step="0.01" />
      </label>
      <label class="field">Montant net prévu (€)
        <input id="f-net" type="number" inputmode="decimal" step="0.01" />
      </label>
      <label class="field">Rôle
        <input id="f-role" type="text" placeholder="ND" />
      </label>

      <p class="form__filename">Fichier : <span id="f-filename">…</span></p>
    </div>

    <div class="pages__actions">
      <button class="btn-secondary" id="btn-cachet-back" type="button">Retour</button>
      <button class="btn-primary" id="btn-cachet-save" type="button">Enregistrer</button>
    </div>
  </section>

  <!-- type="module" : permet d'utiliser import/export entre nos fichiers JS -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
